<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .card-header {
      background: #4f46e5;
      padding: 28px 28px 24px;
      color: #fff;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .card-header .subtitle {
      font-size: 13px;
      opacity: 0.75;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 0;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #4f46e5;
    }

    .input-area input::placeholder {
      color: #a0aec0;
    }

    .btn-add {
      padding: 12px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      line-height: 1;
    }

    .btn-add:hover { background: #4338ca; }
    .btn-add:active { transform: scale(0.95); }

    .stats {
      display: flex;
      gap: 12px;
      padding: 14px 20px 0;
    }

    .stat {
      font-size: 12px;
      color: #718096;
      background: #f7fafc;
      border-radius: 6px;
      padding: 4px 10px;
    }

    .stat span {
      font-weight: 700;
      color: #4f46e5;
    }

    .list {
      list-style: none;
      padding: 12px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      font-size: 14px;
      padding: 32px 0;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f7fafc;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: all 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:hover { border-color: #e2e8f0; }

    .item.checked {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .item-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: #fff;
    }

    .item.checked .item-checkbox {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }

    .item-checkbox svg {
      display: none;
    }

    .item.checked .item-checkbox svg {
      display: block;
    }

    .item-text {
      flex: 1;
      font-size: 15px;
      color: #2d3748;
      word-break: break-all;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #cbd5e0;
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    .btn-delete:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .clear-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      padding: 11px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 13px;
      color: #718096;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
      background: #fff5f5;
    }

    .clear-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .clear-btn:disabled:hover {
      border-color: #e2e8f0;
      color: #718096;
      background: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="subtitle">오늘 필요한 것들을 정리해보세요</div>
    </div>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="아이템 입력 후 Enter 또는 +" maxlength="60">
      <button class="btn-add" onclick="addItem()" title="추가">+</button>
    </div>

    <div class="stats">
      <div class="stat">전체 <span id="totalCount">0</span></div>
      <div class="stat">완료 <span id="doneCount">0</span></div>
      <div class="stat">남은 항목 <span id="remainCount">0</span></div>
    </div>

    <ul class="list" id="list">
      <li class="empty" id="emptyMsg">아직 아이템이 없어요. 추가해보세요!</li>
    </ul>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" disabled>
      완료된 항목 삭제
    </button>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping-items') || '[]');

    const listEl = document.getElementById('list');
    const inputEl = document.getElementById('itemInput');
    const emptyMsg = document.getElementById('emptyMsg');
    const clearBtn = document.getElementById('clearBtn');

    function save() {
      localStorage.setItem('shopping-items', JSON.stringify(items));
    }

    function render() {
      // 기존 아이템 요소 제거 (empty 메시지 제외)
      listEl.querySelectorAll('.item').forEach(el => el.remove());

      if (items.length === 0) {
        emptyMsg.style.display = 'block';
      } else {
        emptyMsg.style.display = 'none';
        items.forEach((item, idx) => {
          const li = document.createElement('li');
          li.className = 'item' + (item.checked ? ' checked' : '');
          li.innerHTML = `
            <div class="item-checkbox" onclick="toggleItem(${idx})" title="완료 체크">
              <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                <path d="M1 5l3.5 3.5L12 1" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-text">${escapeHtml(item.text)}</span>
            <button class="btn-delete" onclick="deleteItem(${idx})" title="삭제">✕</button>
          `;
          listEl.appendChild(li);
        });
      }

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('doneCount').textContent = done;
      document.getElementById('remainCount').textContent = total - done;
      clearBtn.disabled = done === 0;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addItem() {
      const text = inputEl.value.trim();
      if (!text) { inputEl.focus(); return; }
      items.unshift({ text, checked: false });
      save();
      render();
      inputEl.value = '';
      inputEl.focus();
    }

    function toggleItem(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearChecked() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
